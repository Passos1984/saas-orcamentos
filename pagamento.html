<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Upgrade - Pix</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { text-align: center; padding: 50px; background: #f8f9fa; }
        .card { background: white; padding: 30px; border-radius: 10px; max-width: 500px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .qr-code { width: 200px; margin: 20px 0; }
        .pix-code { background: #eee; padding: 10px; word-break: break-all; font-size: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Seu limite acabou! 🚀</h2>
        <p>Escolha um plano para continuar gerando orçamentos ilimitados.</p>
        <button onclick="gerarPix('Basico')" style="background: #28a745; color: white; padding: 10px; width: 100%; border: none; cursor: pointer;">Pagar R$ 10,00 (Plano Básico)</button>
        
        <div id="pix-resultado" style="display:none; margin-top: 20px;">
            <img id="img-qrcode" class="qr-code">
            <div class="pix-code" id="txt-pix"></div>
            <p>Pague e seu acesso será liberado!</p>
        </div>
        <br><br>
        <a href="/painel">Voltar ao painel</a>
    </div>

    <script>
        async function gerarPix(plano) {
            const email = localStorage.getItem("usuario_logado");
            const res = await fetch(`https://saas-orcamentos.onrender.com/gerar_pix`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, plano })
            });
            const dados = await res.json();
            document.getElementById('pix-resultado').style.display = 'block';
            document.getElementById('img-qrcode').src = "data:image/jpeg;base64," + dados.qr_code_imagem;
            document.getElementById('txt-pix').innerText = dados.codigo_copia_cola;
        }
    </script>
</body>
</html>
