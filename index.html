<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gerador de Orçamentos</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="painel-controles">
            <h2>Novo Orçamento</h2>
            <div class="grupo-input">
                <label>Cliente:</label>
                <input type="text" id="nome-cliente" placeholder="Nome do Cliente">
                <input type="text" id="telefone-cliente" placeholder="WhatsApp">
            </div>
            <div class="grupo-input">
                <label>Item:</label>
                <input type="text" id="desc-item" placeholder="Descrição">
                <input type="number" id="qtd-item" value="1">
                <input type="number" id="valor-item" placeholder="Valor Unitário">
                <button id="btn-adicionar" onclick="adicionarItem()">Adicionar Item</button>
            </div>
            <div class="acoes-finais">
                <button id="btn-pdf" onclick="checarPaywall('pdf')">Baixar PDF</button>
                <button id="btn-whatsapp" onclick="checarPaywall('whatsapp')">Enviar WhatsApp</button>
                <button onclick="localStorage.clear(); window.location.href='/'" style="background:#666; color:white">Sair</button>
            </div>
        </div>

        <div class="painel-preview">
            <div id="documento-orcamento" class="folha-a4">
                <div class="cabecalho-doc">
                    <h1>ORÇAMENTO</h1>
                    <p>Data: <span id="data-hoje"></span></p>
                </div>
                <div class="dados-cliente-doc">
                    <p><strong>Cliente:</strong> <span id="doc-cliente-nome">Nenhum</span></p>
                </div>
                <table class="tabela-itens">
                    <thead>
                        <tr><th>Desc</th><th>Qtd</th><th>Unit</th><th>Sub</th></tr>
                    </thead>
                    <tbody id="doc-lista-itens"></tbody>
                </table>
                <div class="total-doc">
                    <h3>Total: R$ <span id="doc-total">0,00</span></h3>
                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
